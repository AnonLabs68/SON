<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradients for the faces to give crystal look -->
    <linearGradient id="grad-top-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="grad-top-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="grad-bottom-left" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="grad-bottom-right" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Background disk: dark translucent circle to ensure high visibility in both light and dark browser tabs -->
  <circle cx="256" cy="256" r="236" fill="#050607" stroke="#00F5FF" stroke-width="6" stroke-opacity="0.3" />

  <!-- Octahedron crystal faces -->
  <!-- Top Left Front -->
  <path d="M 256 70 L 120 256 L 256 316 Z" fill="url(#grad-top-left)" />
  <!-- Top Right Front -->
  <path d="M 256 70 L 392 256 L 256 316 Z" fill="url(#grad-top-right)" />
  <!-- Bottom Left Front -->
  <path d="M 256 442 L 120 256 L 256 316 Z" fill="url(#grad-bottom-left)" />
  <!-- Bottom Right Front -->
  <path d="M 256 442 L 392 256 L 256 316 Z" fill="url(#grad-bottom-right)" />

  <!-- 3D Back Seams (dashed/dotted for depth, drawn first so front lines overlap them) -->
  <path d="M 256 70 L 256 196 L 256 442" fill="none" stroke="#00F5FF" stroke-width="8" stroke-dasharray="12 10" stroke-linecap="round" opacity="0.3" />
  <path d="M 120 256 L 256 196 L 392 256" fill="none" stroke="#00F5FF" stroke-width="8" stroke-dasharray="12 10" stroke-linecap="round" opacity="0.3" />

  <!-- 3D Front Seams and Outer Frame (with glow filter applied) -->
  <g filter="url(#glow)">
    <!-- Outer boundary -->
    <path d="M 256 70 L 392 256 L 256 442 L 120 256 Z" fill="none" stroke="#00F5FF" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Front horizontal axis -->
    <path d="M 120 256 L 256 316 L 392 256" fill="none" stroke="#00F5FF" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Front vertical axis -->
    <path d="M 256 70 L 256 316 L 256 442" fill="none" stroke="#00F5FF" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
  </g>
  
  <!-- Highlight dots on vertices for an active network node feel -->
  <circle cx="256" cy="70" r="10" fill="#ffffff" filter="url(#glow)" />
  <circle cx="120" cy="256" r="10" fill="#ffffff" filter="url(#glow)" />
  <circle cx="392" cy="256" r="10" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="442" r="10" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="316" r="10" fill="#ffffff" filter="url(#glow)" />
</svg>
